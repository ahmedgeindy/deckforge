name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: test
    uses: ./.github/workflows/ci.yml

  pack:
    name: npm pack + draft release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm pack
      - name: Verify publishability (dry run)
        run: npm publish ./*.tgz --dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: deckforge-tarball
          path: "*.tgz"
      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: "*.tgz"

  publish:
    name: npm publish (manual approval)
    needs: pack
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: deckforge-tarball
      - run: npm publish *.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
