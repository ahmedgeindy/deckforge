name: Bug report
description: Report a problem with a DeckForge skill or the installer CLI.
title: "[bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Agent used
      description: Which coding agent were you running DeckForge with?
      options:
        - Claude Code
        - Codex
        - OpenCode
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DeckForge version
      description: Output of `deckforge list` or the installed package.json version.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5, Ubuntu 22.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: report-output
    attributes:
      label: Relevant execution-report or CLI output
      description: Paste the relevant excerpt from execution-report.md/.json, or CLI output (deckforge doctor, install/uninstall logs, error messages). Redact anything sensitive.
      render: text
    validations:
      required: false
